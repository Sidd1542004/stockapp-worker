name: Update stock quotes

on:
  # Every 30 minutes. GitHub cron has a 5-min minimum and is often delayed,
  # so 30 min is a realistic sweet spot for a free-tier MVP.
  schedule:
    - cron: "*/30 * * * *"
  # Also allow manual runs from the Actions tab.
  workflow_dispatch:

# Only one run at a time; skip queued runs if a previous one is still going.
concurrency:
  group: update-quotes
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m src.main
